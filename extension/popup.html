<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        font-size: 13px;
        width: 220px;
        padding: 10px;
      }
      #status {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }
      #dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #999;
      }
      #dot.ok { background: #2ecc40; }
      #dot.down { background: #ff4136; }
      button {
        width: 100%;
        padding: 6px;
        margin-bottom: 8px;
        cursor: pointer;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #result {
        margin-top: 8px;
        color: #555;
        min-height: 1em;
      }
    </style>
  </head>
  <body>
    <div id="status"><span id="dot"></span><span id="status-text">Checking server...</span></div>
    <button id="ocr-btn">OCR this page</button>
    <label><input type="checkbox" id="auto" /> Auto OCR on page flip</label>
    <label><input type="checkbox" id="debug" /> Show text boxes (debug)</label>
    <div id="result"></div>
    <script src="popup.js"></script>
  </body>
</html>
